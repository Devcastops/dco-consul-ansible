---

- name: Restart Consul
  systemd:
    name: consul.service
    state: restarted
    enabled: true
    daemon_reload: true
  when: not packer_build

- name: Restart systemd-resolved
  systemd:
    name: systemd-resolved.service
    state: restarted
    enabled: true
    daemon_reload: true
  when: not packer_build
