---


  - name: Sudo without DNS-dependent host canonicalization
    ansible.builtin.copy:
      dest: /etc/sudoers.d/00-no-dns
      owner: root
      group: root
      mode: '0440'
      content: |
        Defaults !fqdn
        Defaults !log_host
        Defaults:runner !pam_session, !pam_setcred
      validate: '/usr/sbin/visudo -cf %s'
    become: true

  - name: Ensure /etc/hosts wins over DNS
    ansible.builtin.lineinfile:
      path: /etc/nsswitch.conf
      regexp: '^hosts:'
      line: 'hosts: files dns'
      state: present
    become: true

  - name: Ensure self-hostname resolves via /etc/hosts (kills sudo DNS latency)
    ansible.builtin.lineinfile:
      path: /etc/hosts
      regexp: '^127\.0\.1\.1\s'
      line: "127.0.1.1 {{ ansible_hostname }}"
      state: present
    become: true


  - name: Distribution
    debug: msg="{{ ansible_distribution }}"

  - name: Update apt
    ansible.builtin.apt:
      update_cache: true
    when: ansible_distribution == "Ubuntu"
  
  - name: Install Packages
    ansible.builtin.package:
      name: "{{item}}"
    with_items:
      - unzip
      - jq
  
  - name: Create Consul Group
    group:
      name: "{{ consul_group }}"
  
  - name: Create Consul User
    user:
      name: "{{ consul_user }}"
      group: "{{ consul_group }}"
  
  - name: Install consul
    ansible.builtin.get_url:
      url: https://releases.hashicorp.com/consul/{{ consul_version }}/consul_{{ consul_version }}_linux_amd64.zip
      dest: /tmp/consul{{ consul_version }}.zip
  
  - name: Unzip Consul
    unarchive:
      src: /tmp/consul{{ consul_version }}.zip
      dest: /usr/local/bin
      remote_src: true
    notify: Restart Consul
  
  - name: Wipe Consul Data
    file:
      path: "{{ consul_data_dir }}"
      state: absent
    when: consul_server_wipe_data
    notify: Restart Consul
  
  - name: Create Consul Directory
    file:
      path: "{{item}}"
      state: directory
      owner: consul
      group: consul
      mode: "0750"
    with_items: 
      - "{{ consul_config_dir }}"
      - "{{ consul_data_dir }}"
  
  - name: Add Consul Common Config
    template:
      src: common-config.hcl.j2
      dest: "{{consul_config_dir}}/common-config.hcl"
    notify: Restart Consul
  
  - name: Add Consul.Service
    template:
      src: consul.service.j2
      dest: /etc/systemd/system/consul.service
    notify: Restart Consul
  
  - name: Enable Consul Service
    systemd:
      name: consul.service
      enabled: true

  - name: Manage /etc/hosts dynamically on every boot
    ansible.builtin.copy:
      dest: /etc/cloud/cloud.cfg.d/99-manage-etc-hosts.cfg
      content: |
        manage_etc_hosts: true
      mode: '0644'
    become: true

  - name: Ensure cloud-init's /etc/hosts template carries the GCP metadata short-name
    # manage_etc_hosts:true makes cloud-init rewrite /etc/hosts from this template on
    # EVERY boot, wiping anything written straight to /etc/hosts. Vault's gce auto-auth
    # hardcodes http://metadata/ (bypasses dnsmasq), so the entry must live in the
    # template to survive per-boot regeneration.
    ansible.builtin.lineinfile:
      path: /etc/cloud/templates/hosts.debian.tmpl
      regexp: '^169\.254\.169\.254\s'
      line: '169.254.169.254 metadata.google.internal metadata'
      insertafter: '^127\.0\.0\.1 localhost'
      state: present
    become: true

  - name: Ensure /etc/dnsmasq.d exists (package not yet installed)
    ansible.builtin.file:
      path: /etc/dnsmasq.d
      state: directory
      owner: root
      group: root
      mode: '0755'
    become: true

  - name: Remove stale extensionless dnsmasq consul drop-in
    ansible.builtin.file:
      path: /etc/dnsmasq.d/10-consul
      state: absent
    become: true

  - name: Configure dnsmasq consul forwarding (no resolver takeover)
    ansible.builtin.copy:
      dest: /etc/dnsmasq.d/10-consul.conf
      owner: root
      group: root
      mode: '0644'
      content: |
        bind-interfaces
        listen-address=127.0.0.1
        no-resolv
        server=/consul/127.0.0.1#8600
        server=127.0.0.53
        bogus-priv
        domain-needed
    become: true

  - name: Install dnsmasq
    ansible.builtin.apt:
      name: dnsmasq
      state: present
      update_cache: false
      # Block the maintainer-script auto-start: at this point /etc/default/dnsmasq
      # may still lack CONFIG_DIR, and resolved already holds 127.0.0.53:53.
      # We start it explicitly below, after the defaults are correct.
      policy_rc_d: 101

  - name: Ensure dnsmasq loads /etc/dnsmasq.d drop-ins (preserve distro CONFIG_DIR)
    ansible.builtin.lineinfile:
      path: /etc/default/dnsmasq
      regexp: '^\s*#?\s*CONFIG_DIR='
      line: 'CONFIG_DIR=/etc/dnsmasq.d,.dpkg-dist,.dpkg-old,.dpkg-new'
      state: present
    become: true

  - name: Disable dnsmasq resolvconf integration (without clobbering defaults)
    ansible.builtin.lineinfile:
      path: /etc/default/dnsmasq
      regexp: '^\s*#?\s*IGNORE_RESOLVCONF='
      line: 'IGNORE_RESOLVCONF=yes'
      state: present
    become: true

  - name: Enable and start dnsmasq immediately
    ansible.builtin.systemd:
      name: dnsmasq
      state: started
      enabled: true
      daemon_reload: true

  - name: Reset any failed dnsmasq state
    ansible.builtin.command: systemctl reset-failed dnsmasq
    changed_when: false
    failed_when: false
    become: true

  - name: Check whether /etc/resolv.conf is the systemd-resolved symlink
    ansible.builtin.stat:
      path: /etc/resolv.conf
    register: _resolv_conf
    become: true

  - name: Drop the resolved symlink so resolv.conf can be managed statically
    ansible.builtin.file:
      path: /etc/resolv.conf
      state: absent
    become: true
    when: _resolv_conf.stat.islnk | default(false)

  - name: Point /etc/resolv.conf at local dnsmasq (front door)
    ansible.builtin.copy:
      dest: /etc/resolv.conf
      owner: root
      group: root
      mode: '0644'
      content: |
        # Managed by Ansible (dco.consul.base) - dnsmasq is the first-hop resolver.
        nameserver 127.0.0.1
        options timeout:1 attempts:2
    become: true