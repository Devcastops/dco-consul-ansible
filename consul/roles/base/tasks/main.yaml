---

  - name: Distribution
    debug: msg="{{ ansible_distribution }}"

  - name: Update apt
    ansible.builtin.apt:
      update_cache: true
    when: ansible_distribution == "ubuntu"
  
  - name: Install Packages
    ansible.builtin.package:
      name: "{{item}}"
    with_items:
      - unzip
      - jq
  
  - name: Create Consul Group
    group:
      name: "{{ consul_group }}"
  
  - name: Create Consul User
    user:
      name: "{{ consul_user }}"
      group: "{{ consul_group }}"
  
  - name: Install consul
    ansible.builtin.get_url:
      url: https://releases.hashicorp.com/consul/{{ consul_version }}/consul_{{ consul_version }}_linux_amd64.zip
      dest: /tmp/consul{{ consul_version }}.zip
  
  - name: Unzip Consul
    unarchive:
      src: /tmp/consul{{ consul_version }}.zip
      dest: /usr/local/bin
      remote_src: true
    notify: Restart Consul
  
  - name: Wipe Consul Data
    file:
      path: "{{ consul_data_dir }}"
      state: absent
    when: consul_server_wipe_data
    notify: Restart Consul
  
  - name: Create Consul Directory
    file:
      path: "{{item}}"
      state: directory
      owner: consul
      group: consul
      mode: "0750"
    with_items: 
      - "{{ consul_config_dir }}"
      - "{{ consul_data_dir }}"
  
  - name: Add Consul Common Config
    template:
      src: common-config.hcl.j2
      dest: "{{consul_config_dir}}/common-config.hcl"
    notify: Restart Consul
  
  - name: Add Consul.Service
    template:
      src: consul.service.j2
      dest: /etc/systemd/system/consul.service
    notify: Restart Consul
  

  - name: Set up resolved folder
    file:
      path: /etc/systemd/resolved.conf.d
      state: directory
      owner: root
      group: root
      mode: "0755"

  - name: Add resolved config
    copy:
      content: |
        [Resolve]
        DNS=127.0.0.1:8600
        DNSSEC=false
        Domains=~consul
      dest: /etc/systemd/resolved.conf.d/consul.conf
      owner: root
      group: root
      mode: "0644"
    notify: Restart systemd-resolved