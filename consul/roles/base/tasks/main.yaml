---


  - name: Sudo without DNS-dependent host canonicalization
    ansible.builtin.copy:
      dest: /etc/sudoers.d/00-no-dns
      owner: root
      group: root
      mode: '0440'
      content: |
        Defaults !fqdn
        Defaults !log_host
        Defaults:runner !pam_session, !pam_setcred
      validate: '/usr/sbin/visudo -cf %s'
    become: true

  - name: Ensure /etc/hosts wins over DNS
    ansible.builtin.lineinfile:
      path: /etc/nsswitch.conf
      regexp: '^hosts:'
      line: 'hosts: files dns'
      state: present
    become: true

  - name: Ensure self-hostname resolves via /etc/hosts (kills sudo DNS latency)
    ansible.builtin.lineinfile:
      path: /etc/hosts
      regexp: '^127\.0\.1\.1\s'
      line: "127.0.1.1 {{ ansible_hostname }}"
      state: present
    become: true

  - name: Distribution
    debug: msg="{{ ansible_distribution }}"

  - name: Update apt
    ansible.builtin.apt:
      update_cache: true
    when: ansible_distribution == "Ubuntu"
  
  - name: Install Packages
    ansible.builtin.package:
      name: "{{item}}"
    with_items:
      - unzip
      - jq
  
  - name: Create Consul Group
    group:
      name: "{{ consul_group }}"
  
  - name: Create Consul User
    user:
      name: "{{ consul_user }}"
      group: "{{ consul_group }}"
  
  - name: Install consul
    ansible.builtin.get_url:
      url: https://releases.hashicorp.com/consul/{{ consul_version }}/consul_{{ consul_version }}_linux_amd64.zip
      dest: /tmp/consul{{ consul_version }}.zip
  
  - name: Unzip Consul
    unarchive:
      src: /tmp/consul{{ consul_version }}.zip
      dest: /usr/local/bin
      remote_src: true
    notify: Restart Consul
  
  - name: Wipe Consul Data
    file:
      path: "{{ consul_data_dir }}"
      state: absent
    when: consul_server_wipe_data
    notify: Restart Consul
  
  - name: Create Consul Directory
    file:
      path: "{{item}}"
      state: directory
      owner: consul
      group: consul
      mode: "0750"
    with_items: 
      - "{{ consul_config_dir }}"
      - "{{ consul_data_dir }}"
  
  - name: Add Consul Common Config
    template:
      src: common-config.hcl.j2
      dest: "{{consul_config_dir}}/common-config.hcl"
    notify: Restart Consul
  
  - name: Add Consul.Service
    template:
      src: consul.service.j2
      dest: /etc/systemd/system/consul.service
    notify: Restart Consul
  
  - name: Enable Consul Service
    systemd:
      name: consul.service
      enabled: true

  - name: Manage /etc/hosts dynamically on every boot
    ansible.builtin.copy:
      dest: /etc/cloud/cloud.cfg.d/99-manage-etc-hosts.cfg
      content: |
        manage_etc_hosts: true
      mode: '0644'
    become: true


  - name: Preserve systemd-resolved DNS config before takeover
    block:

    - name: Read resolved upstreams (authoritative)
      ansible.builtin.slurp:
        src: /run/systemd/resolve/resolv.conf
      register: _resolved_conf
      become: true

    - name: Parse non-loopback upstream nameservers
      ansible.builtin.set_fact:
        consul_base_upstream_dns: >-
          {{ (_resolved_conf.content | b64decode).splitlines()
            | map('trim') | reject('match', '^#')
            | select('match', '^nameserver\s+')
            | map('regex_replace', '^nameserver\s+', '')
            | reject('match', '^127\.') | list }}

    - name: Show what we preserved
      ansible.builtin.debug:
        msg:
          - "search domains: '{{ consul_base_search_domains | default('') }}'"
          - "upstream DNS:   {{ consul_base_upstream_dns | default([]) }}"

  - name: PRE-DNSMASQ ground truth (resolver startup)
    ansible.builtin.shell: |
      exec </dev/null
      set +e
      {
        echo "=== PRE_DNSMASQ $(date -Is) ==="
        echo "[hostname]"; timeout -k 2s 5s hostname; timeout -k 2s 5s hostname -f
        echo "[resolv_link]"; readlink -f /etc/resolv.conf
        echo "[/etc/resolv.conf]"; cat /etc/resolv.conf
        echo "[/run/systemd/resolve/resolv.conf]"; cat /run/systemd/resolve/resolv.conf
        echo "[nsswitch hosts]"; grep '^hosts:' /etc/nsswitch.conf
        echo "[/etc/hosts]"; cat /etc/hosts
        echo "[getent hostname]"; timeout -k 2s 5s getent hosts "$(hostname)" || echo "getent_rc=$?"
      } 2>&1
    args:
      executable: /bin/bash
    become: false
    changed_when: false
    failed_when: false
    register: pre_dns_diag

  - ansible.builtin.debug:
      var: pre_dns_diag.stdout_lines

  - name: Ensure /etc/dnsmasq.d exists (package not yet installed)
    ansible.builtin.file:
      path: /etc/dnsmasq.d
      state: directory
      owner: root
      group: root
      mode: '0755'
    become: true

  - name: Remove stale extensionless dnsmasq consul drop-in
    ansible.builtin.file:
      path: /etc/dnsmasq.d/10-consul
      state: absent
    become: true

  - name: Configure dnsmasq consul forwarding (no resolver takeover)
    ansible.builtin.copy:
      dest: /etc/dnsmasq.d/10-consul.conf
      owner: root
      group: root
      mode: '0644'
      content: |
        bind-interfaces
        listen-address=127.0.0.1
        no-resolv
        server=/consul/127.0.0.1#8600
        server=127.0.0.53
        bogus-priv
        domain-needed
    become: true

  - name: Install dnsmasq
    ansible.builtin.apt:
      name: dnsmasq
      state: present
      update_cache: false
      # Block the maintainer-script auto-start: at this point /etc/default/dnsmasq
      # may still lack CONFIG_DIR, and resolved already holds 127.0.0.53:53.
      # We start it explicitly below, after the defaults are correct.
      policy_rc_d: 101

  - name: Ensure dnsmasq loads /etc/dnsmasq.d drop-ins (preserve distro CONFIG_DIR)
    ansible.builtin.lineinfile:
      path: /etc/default/dnsmasq
      regexp: '^\s*#?\s*CONFIG_DIR='
      line: 'CONFIG_DIR=/etc/dnsmasq.d,.dpkg-dist,.dpkg-old,.dpkg-new'
      state: present
    become: true

  - name: Disable dnsmasq resolvconf integration (without clobbering defaults)
    ansible.builtin.lineinfile:
      path: /etc/default/dnsmasq
      regexp: '^\s*#?\s*IGNORE_RESOLVCONF='
      line: 'IGNORE_RESOLVCONF=yes'
      state: present
    become: true

  
  - name: POST-INSTALL ground truth (did install auto-start break resolver?)
    ansible.builtin.shell: |
      exec </dev/null
      set +e
      export SYSTEMD_PAGER= SYSTEMD_LESS=FRSXMK PAGER=cat
      {
        echo "=== POST_INSTALL $(date -Is) ==="
        echo "[dnsmasq active]"; timeout -k 2s 5s systemctl is-active dnsmasq
        echo "[listen :53]"; timeout -k 2s 5s ss -lntu 'sport = :53'
        echo "[resolv_link]"; readlink -f /etc/resolv.conf
        echo "[resolved active]"; timeout -k 2s 5s systemctl is-active systemd-resolved
        echo "[default dnsmasq]"; grep -nE '^(CONFIG_DIR|IGNORE_RESOLVCONF|DNSMASQ_OPTS|DNSMASQ_EXCEPT)=' /etc/default/dnsmasq || echo "NONE"
        echo "[drop-in 10-consul.conf]"; cat /etc/dnsmasq.d/10-consul.conf || echo "MISSING"
        echo "[dnsmasq --test]"; ( . /etc/default/dnsmasq 2>/dev/null; if [ -n "${CONFIG_DIR:-}" ]; then timeout -k 2s 5s /usr/sbin/dnsmasq --test -7 "$CONFIG_DIR"; else timeout -k 2s 5s /usr/sbin/dnsmasq --test; fi )

      } 2>&1
    args:
      executable: /bin/bash
    become: false
    changed_when: false
    failed_when: false
    register: post_install_diag

  - ansible.builtin.debug:
      var: post_install_diag.stdout_lines

  - name: Enable and start dnsmasq immediately
    ansible.builtin.systemd:
      name: dnsmasq
      state: started
      enabled: true
      daemon_reload: true


  - name: Verify dnsmasq is active and bound to loopback only
    ansible.builtin.shell: |
     exec </dev/null
      set +e
      export SYSTEMD_PAGER= PAGER=cat
      {
        echo "[dnsmasq active]"; timeout -k 2s 5s systemctl is-active dnsmasq
        echo "[listen :53]"; timeout -k 2s 5s ss -lntu 'sport = :53'
        echo "[dnsmasq cmdline]"; tr '\0' ' ' < "/proc/$(pidof dnsmasq | awk '{print $1}')/cmdline" 2>/dev/null; echo
      } 2>&1
    args:
      executable: /bin/bash
    become: true
    changed_when: false
    failed_when: false
    register: dnsmasq_verify

  - ansible.builtin.debug:
      var: dnsmasq_verify.stdout_lines

  - name: Reset any failed dnsmasq state
    ansible.builtin.command: systemctl reset-failed dnsmasq
    changed_when: false
    failed_when: false
    become: true


  - name: Verify dnsmasq actually started
    ansible.builtin.command: systemctl is-active --quiet dnsmasq
    register: _dnsmasq_active
    changed_when: false
    failed_when: false

  - name: Dump dnsmasq diagnostics on failure
    when: _dnsmasq_active.rc != 0
    block:
      - ansible.builtin.command: journalctl -u dnsmasq -n 100 --no-pager
        register: _dnsmasq_log
        changed_when: false
      - ansible.builtin.fail:
          msg: "dnsmasq failed to start:\n{{ _dnsmasq_log.stdout }}"

  - name: Ensure systemd-resolved drop-in directory exists
    ansible.builtin.file:
      path: /etc/systemd/resolved.conf.d
      state: directory
      owner: root
      group: root
      mode: '0755'
    become: true

  - name: Route .consul to local dnsmasq via systemd-resolved (persistent)
    ansible.builtin.copy:
      dest: /etc/systemd/resolved.conf.d/consul.conf
      owner: root
      group: root
      mode: '0644'
      content: |
        # Split-DNS: send *.consul queries to the local dnsmasq on 127.0.0.1,
        # which forwards them to the Consul agent (127.0.0.1#8600).
        # "~consul" is a ROUTING-ONLY domain, so every other name keeps using
        # the per-link upstream DNS (the interface's implicit "~." default route).
        # This replaces the old "resolvectl ... lo" approach, which fails because
        # systemd-resolved refuses to manage the loopback link.
        [Resolve]
        DNS=127.0.0.1
        Domains=~consul
    become: true


  - name: Apply .consul routing now (reload units + restart systemd-resolved)
    ansible.builtin.systemd:
      name: systemd-resolved
      state: restarted
      daemon_reload: true
    become: true

  - name: DIAG resolver latency (bounded, non-fatal)
    ansible.builtin.shell: |
      exec </dev/null
      set +e
      export SYSTEMD_PAGER= SYSTEMD_LESS=FRSXMK PAGER=cat
      {
        echo "=== DIAG_LATENCY $(date -Is) ==="
        for i in 1 2 3; do timeout -k 2s 8s /usr/bin/time -f 'sudo=%E' sudo -n true; done
        if command -v dig >/dev/null 2>&1; then
          for ip in 127.0.0.1 127.0.1.1; do
            timeout -k 2s 5s /usr/bin/time -f "ptr_$ip=%E" dig +tries=1 +time=2 -x "$ip" @127.0.0.1 +short
          done
        else
          echo "dig_not_installed"
        fi
        timeout -k 2s 5s /usr/bin/time -f 'getent=%E' getent group consul
      } 2>&1
    args:
      executable: /bin/bash
    become: false
    changed_when: false
    failed_when: false
    register: diag_latency

  - ansible.builtin.debug:
      var: diag_latency.stdout_lines