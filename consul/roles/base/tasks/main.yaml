---

  - name: Distribution
    debug: msg="{{ ansible_distribution }}"

  - name: Update apt
    ansible.builtin.apt:
      update_cache: true
    when: ansible_distribution == "Ubuntu"
  
  - name: Install Packages
    ansible.builtin.package:
      name: "{{item}}"
    with_items:
      - unzip
      - jq
  
  - name: Create Consul Group
    group:
      name: "{{ consul_group }}"
  
  - name: Create Consul User
    user:
      name: "{{ consul_user }}"
      group: "{{ consul_group }}"
  
  - name: Install consul
    ansible.builtin.get_url:
      url: https://releases.hashicorp.com/consul/{{ consul_version }}/consul_{{ consul_version }}_linux_amd64.zip
      dest: /tmp/consul{{ consul_version }}.zip
  
  - name: Unzip Consul
    unarchive:
      src: /tmp/consul{{ consul_version }}.zip
      dest: /usr/local/bin
      remote_src: true
    notify: Restart Consul
  
  - name: Wipe Consul Data
    file:
      path: "{{ consul_data_dir }}"
      state: absent
    when: consul_server_wipe_data
    notify: Restart Consul
  
  - name: Create Consul Directory
    file:
      path: "{{item}}"
      state: directory
      owner: consul
      group: consul
      mode: "0750"
    with_items: 
      - "{{ consul_config_dir }}"
      - "{{ consul_data_dir }}"
  
  - name: Add Consul Common Config
    template:
      src: common-config.hcl.j2
      dest: "{{consul_config_dir}}/common-config.hcl"
    notify: Restart Consul
  
  - name: Add Consul.Service
    template:
      src: consul.service.j2
      dest: /etc/systemd/system/consul.service
    notify: Restart Consul
  
  - name: Enable Consul Service
    systemd:
      name: consul.service
      enabled: true


  - name: Ensure self-hostname resolves via /etc/hosts (kills sudo DNS latency)
    ansible.builtin.lineinfile:
      path: /etc/hosts
      regexp: '^127\.0\.1\.1\s'
      line: "127.0.1.1 {{ ansible_hostname }}"
      state: present
    become: true

  - name: Manage /etc/hosts dynamically on every boot
    ansible.builtin.copy:
      dest: /etc/cloud/cloud.cfg.d/99-manage-etc-hosts.cfg
      content: |
        manage_etc_hosts: true
      mode: '0644'
    become: true


  - name: Preserve systemd-resolved DNS config before takeover
    block:
    - name: Find the most authoritative pre-existing resolver file
      ansible.builtin.stat:
        path: "{{ item }}"
      loop:
        - /run/systemd/resolve/resolv.conf
        - /run/systemd/resolve/stub-resolv.conf
        - /etc/resolv.conf
      register: _resolv_candidates

    - name: Select first existing resolver file
      ansible.builtin.set_fact:
        _resolv_src: "{{ (_resolv_candidates.results
                          | selectattr('stat.exists', 'eq', true)
                          | map(attribute='stat.path') | list | first) | default('') }}"

    - name: Read existing resolver config
      ansible.builtin.slurp:
        src: "{{ _resolv_src }}"
      register: _resolv_raw
      when: _resolv_src | length > 0

    - name: Parse search domains and upstream nameservers
      ansible.builtin.set_fact:
        _resolv_lines: >-
          {{ (_resolv_raw.content | default('') | b64decode).splitlines()
              | map('trim') | reject('match', '^#') | list }}
      when: _resolv_src | length > 0

    - name: Capture search domains (single 'search ...' line)
      ansible.builtin.set_fact:
        consul_base_search_domains: >-
          {{ (_resolv_lines | default([])
              | select('match', '^search\s+')
              | map('regex_replace', '^search\s+', '')
              | list | first | default('')) }}

    - name: Capture upstream nameservers (excluding loopback stubs)
      ansible.builtin.set_fact:
        consul_base_upstream_dns: >-
          {{ _resolv_lines | default([])
              | select('match', '^nameserver\s+')
              | map('regex_replace', '^nameserver\s+', '')
              | reject('match', '^127\.')
              | list }}

    - name: Show what we preserved
      ansible.builtin.debug:
        msg:
          - "search domains: '{{ consul_base_search_domains | default('') }}'"
          - "upstream DNS:   {{ consul_base_upstream_dns | default([]) }}"

  - name: Install dnsmasq
    ansible.builtin.apt:
      name: dnsmasq
      state: present
      update_cache: false

  - name: Configure dnsmasq to forward .consul to Consul DNS
    ansible.builtin.copy:
      dest: /etc/dnsmasq.d/10-consul
      owner: root
      group: root
      mode: '0644'
      content: |
        server=/consul/127.0.0.1#8600
        bind-interfaces
        listen-address=127.0.0.1
        no-resolv
        bogus-priv
        domain-needed
        {% set upstreams = consul_base_upstream_dns | default([]) %}
        {% if upstreams | length > 0 %}
        {% for ns in upstreams %}
        server={{ ns }}
        {% endfor %}
        {% else %}
        server=169.254.169.254
        {% endif %}
    notify: Restart dnsmasq

  - name: Disable sudo FQDN reverse lookup
    ansible.builtin.copy:
      dest: /etc/sudoers.d/10-no-fqdn
      content: "Defaults !fqdn\n"
      mode: '0440'
      owner: root
      group: root
      validate: 'visudo -cf %s'
    become: true

  - name: Ensure /etc/hosts wins over DNS
    ansible.builtin.lineinfile:
      path: /etc/nsswitch.conf
      regexp: '^hosts:'
      line: 'hosts: files dns'
      state: present
    become: true

  - name: Enable and start dnsmasq immediately
    ansible.builtin.systemd:
      name: dnsmasq
      state: started
      enabled: true
      daemon_reload: true
  - name: Verify dnsmasq actually started
    ansible.builtin.command: systemctl is-active --quiet dnsmasq
    register: _dnsmasq_active
    changed_when: false
    failed_when: false

  - name: Dump dnsmasq diagnostics on failure
    when: _dnsmasq_active.rc != 0
    block:
      - ansible.builtin.command: journalctl -u dnsmasq -n 100 --no-pager
        register: _dnsmasq_log
        changed_when: false
      - ansible.builtin.fail:
          msg: "dnsmasq failed to start:\n{{ _dnsmasq_log.stdout }}"

  - name: Remove systemd-resolved symlink and set static resolv.conf
    ansible.builtin.copy:
      dest: /etc/resolv.conf
      owner: root
      group: root
      mode: '0644'
      force: true
      content: |
        nameserver 127.0.0.1
        search {{ consul_base_search_domains }}

  - name: Disable systemd-resolved (dnsmasq takes over)
    ansible.builtin.systemd:
      name: systemd-resolved
      state: stopped
      enabled: false


  - name: DIAG resolver latency
    shell: |
      for i in 1 2 3; do /usr/bin/time -f 'sudo=%E' sudo -n true; done
      for ip in 127.0.0.1 127.0.1.1; do /usr/bin/time -f "ptr_$ip=%E" dig +tries=1 +time=2 -x $ip @127.0.0.1 +short; done
      /usr/bin/time -f 'getent=%E' getent group consul
    become: true
    changed_when: false