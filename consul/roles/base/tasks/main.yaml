---


  - name: Sudo without DNS-dependent host canonicalization
    ansible.builtin.copy:
      dest: /etc/sudoers.d/00-no-dns
      owner: root
      group: root
      mode: '0440'
      content: |
        Defaults !fqdn
        Defaults !log_host
        Defaults:runner !pam_session, !pam_setcred
      validate: '/usr/sbin/visudo -cf %s'
    become: true

  - name: Ensure /etc/hosts wins over DNS
    ansible.builtin.lineinfile:
      path: /etc/nsswitch.conf
      regexp: '^hosts:'
      line: 'hosts: files dns'
      state: present
    become: true

  - name: Ensure self-hostname resolves via /etc/hosts (kills sudo DNS latency)
    ansible.builtin.lineinfile:
      path: /etc/hosts
      regexp: '^127\.0\.1\.1\s'
      line: "127.0.1.1 {{ ansible_hostname }}"
      state: present
    become: true

  - name: Distribution
    debug: msg="{{ ansible_distribution }}"

  - name: Update apt
    ansible.builtin.apt:
      update_cache: true
    when: ansible_distribution == "Ubuntu"
  
  - name: Install Packages
    ansible.builtin.package:
      name: "{{item}}"
    with_items:
      - unzip
      - jq
  
  - name: Create Consul Group
    group:
      name: "{{ consul_group }}"
  
  - name: Create Consul User
    user:
      name: "{{ consul_user }}"
      group: "{{ consul_group }}"
  
  - name: Install consul
    ansible.builtin.get_url:
      url: https://releases.hashicorp.com/consul/{{ consul_version }}/consul_{{ consul_version }}_linux_amd64.zip
      dest: /tmp/consul{{ consul_version }}.zip
  
  - name: Unzip Consul
    unarchive:
      src: /tmp/consul{{ consul_version }}.zip
      dest: /usr/local/bin
      remote_src: true
    notify: Restart Consul
  
  - name: Wipe Consul Data
    file:
      path: "{{ consul_data_dir }}"
      state: absent
    when: consul_server_wipe_data
    notify: Restart Consul
  
  - name: Create Consul Directory
    file:
      path: "{{item}}"
      state: directory
      owner: consul
      group: consul
      mode: "0750"
    with_items: 
      - "{{ consul_config_dir }}"
      - "{{ consul_data_dir }}"
  
  - name: Add Consul Common Config
    template:
      src: common-config.hcl.j2
      dest: "{{consul_config_dir}}/common-config.hcl"
    notify: Restart Consul
  
  - name: Add Consul.Service
    template:
      src: consul.service.j2
      dest: /etc/systemd/system/consul.service
    notify: Restart Consul
  
  - name: Enable Consul Service
    systemd:
      name: consul.service
      enabled: true

  - name: Manage /etc/hosts dynamically on every boot
    ansible.builtin.copy:
      dest: /etc/cloud/cloud.cfg.d/99-manage-etc-hosts.cfg
      content: |
        manage_etc_hosts: true
      mode: '0644'
    become: true


  - name: Preserve systemd-resolved DNS config before takeover
    block:

    - name: Read resolved upstreams (authoritative)
      ansible.builtin.slurp:
        src: /run/systemd/resolve/resolv.conf
      register: _resolved_conf
      become: true

    - name: Parse non-loopback upstream nameservers
      ansible.builtin.set_fact:
        consul_base_upstream_dns: >-
          {{ (_resolved_conf.content | b64decode).splitlines()
            | map('trim') | reject('match', '^#')
            | select('match', '^nameserver\s+')
            | map('regex_replace', '^nameserver\s+', '')
            | reject('match', '^127\.') | list }}

    - name: Show what we preserved
      ansible.builtin.debug:
        msg:
          - "search domains: '{{ consul_base_search_domains | default('') }}'"
          - "upstream DNS:   {{ consul_base_upstream_dns | default([]) }}"

  - name: PRE-DNSMASQ ground truth (resolver + sudo startup)
    ansible.builtin.shell: |
      set -o pipefail
      {
        echo "=== PRE_DNSMASQ $(date -Is) ==="
        echo "[hostname]"; hostname; hostname -f || true
        echo "[resolv_link]"; readlink -f /etc/resolv.conf || true
        echo "[/etc/resolv.conf]"; cat /etc/resolv.conf || true
        echo "[/run/systemd/resolve/resolv.conf]"; cat /run/systemd/resolve/resolv.conf || true
        echo "[nsswitch hosts]"; grep '^hosts:' /etc/nsswitch.conf || true
        echo "[/etc/hosts]"; cat /etc/hosts || true
        echo "[getent hostname]"; timeout 5s getent hosts "$(hostname)" || echo "getent_rc=$?"
        echo "[sudo -n true timing]"; timeout 8s bash -lc 'time sudo -n true' || echo "sudo_rc=$?"
      } 2>&1
    args:
      executable: /bin/bash
    become: false
    changed_when: false
    failed_when: false
    register: pre_dns_diag

  - ansible.builtin.debug:
      var: pre_dns_diag.stdout_lines

  - name: Ensure /etc/dnsmasq.d exists (package not yet installed)
    ansible.builtin.file:
      path: /etc/dnsmasq.d
      state: directory
      owner: root
      group: root
      mode: '0755'
    become: true

  - name: Configure dnsmasq consul forwarding (no resolver takeover)
    ansible.builtin.copy:
      dest: /etc/dnsmasq.d/10-consul
      owner: root
      group: root
      mode: '0644'
      content: |
        bind-interfaces
        listen-address=127.0.0.1
        no-resolv
        server=/consul/127.0.0.1#8600
        server=127.0.0.53
        bogus-priv
        domain-needed
    become: true


  - name: Disable dnsmasq resolvconf integration
    ansible.builtin.copy:
      dest: /etc/default/dnsmasq
      mode: '0644'
      content: "IGNORE_RESOLVCONF=yes\n"
    become: true


  - name: Install dnsmasq
    ansible.builtin.apt:
      name: dnsmasq
      state: present
      update_cache: false
  
  - name: POST-INSTALL ground truth (did install auto-start break sudo/resolver?)
    ansible.builtin.shell: |
      {
        echo "=== POST_INSTALL $(date -Is) ==="
        echo "[sudo -n true timing]"; timeout 8s bash -lc 'time sudo -n true' || echo "sudo_rc=$?"
        echo "[dnsmasq active]"; systemctl is-active dnsmasq || true
        echo "[listen :53]"; ss -lntu 'sport = :53' || true
        echo "[resolv_link]"; readlink -f /etc/resolv.conf || true
        echo "[resolved active]"; systemctl is-active systemd-resolved || true
      } 2>&1
    args:
      executable: /bin/bash
    become: false
    changed_when: false
    failed_when: false
    register: post_install_diag

  - ansible.builtin.debug:
      var: post_install_diag.stdout_lines

  - name: Enable and start dnsmasq immediately
    ansible.builtin.systemd:
      name: dnsmasq
      state: started
      enabled: true
      daemon_reload: true

  - name: Reset any failed dnsmasq state
    ansible.builtin.command: systemctl reset-failed dnsmasq
    changed_when: false
    failed_when: false
    become: true


  - name: Verify dnsmasq actually started
    ansible.builtin.command: systemctl is-active --quiet dnsmasq
    register: _dnsmasq_active
    changed_when: false
    failed_when: false

  - name: Dump dnsmasq diagnostics on failure
    when: _dnsmasq_active.rc != 0
    block:
      - ansible.builtin.command: journalctl -u dnsmasq -n 100 --no-pager
        register: _dnsmasq_log
        changed_when: false
      - ansible.builtin.fail:
          msg: "dnsmasq failed to start:\n{{ _dnsmasq_log.stdout }}"


  - name: Route .consul to local dnsmasq for current boot
    ansible.builtin.command: "{{ item }}"
    loop:
      - resolvectl dns lo 127.0.0.1
      - resolvectl domain lo ~consul
    changed_when: false
    become: true

  - name: Persist .consul split-DNS routing across reboots
    ansible.builtin.copy:
      dest: /etc/systemd/system/consul-dns-route.service
      mode: '0644'
      content: |
        [Unit]
        Description=Route .consul DNS to local dnsmasq via systemd-resolved
        After=systemd-resolved.service dnsmasq.service
        Wants=systemd-resolved.service dnsmasq.service
        [Service]
        Type=oneshot
        RemainAfterExit=yes
        ExecStart=/usr/bin/resolvectl dns lo 127.0.0.1
        ExecStart=/usr/bin/resolvectl domain lo ~consul
        [Install]
        WantedBy=multi-user.target
    become: true

  - name: Enable consul DNS route unit on boot
    ansible.builtin.systemd:
      name: consul-dns-route.service
      enabled: true
      daemon_reload: true
    become: true

  - name: DIAG resolver latency
    shell: |
      for i in 1 2 3; do /usr/bin/time -f 'sudo=%E' sudo -n true; done
      for ip in 127.0.0.1 127.0.1.1; do /usr/bin/time -f "ptr_$ip=%E" dig +tries=1 +time=2 -x $ip @127.0.0.1 +short; done
      /usr/bin/time -f 'getent=%E' getent group consul
    become: true
    changed_when: false